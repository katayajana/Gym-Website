<!DOCTYPE html>

<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stadia Gym - Services</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- Header -->

<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">

        <a class="navbar-brand" href="home.html">
            <img src="assets/download.png"
                 alt="Stadia Gym Logo"
                 height="100">
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
             id="navbarNav">

            <div class="navbar-nav ms-auto">

                <a class="nav-link" href="home.html">
                    Home
                </a>

                <a class="nav-link active" href="services.html">
                    Services
                </a>

                <a class="nav-link" href="contact.html">
                    Contact Us
                </a>

            </div>

        </div>

    </div>
</nav>

<!-- Services Banner -->

<section class="banner-section">
    <img src="assets/services banner.png"
     class="services-banner"
     alt="Services Banner">
</section>

<section class="container text-center my-5">

    <h1 class="fw-bold">
        Our Services
    </h1>

    <p class="text-muted">
        Discover the activities and facilities available at Stadia Gym.
    </p>

</section>

<!-- Services Section -->

<!-- Loader -->

<div id="loader" class="text-center my-5">

    <div class="spinner-border text-warning"
         role="status">

        <span class="visually-hidden">
            Loading...
        </span>

    </div>

    <p class="mt-3 fw-bold">
        Loading services...
    </p>

</div>

<section class="container my-5">

    <div class="d-flex justify-content-center mb-4">

        <button id="listViewBtn"
                class="btn btn-outline-dark me-2">
            <i class="bi bi-list"></i>
            List View
        </button>

        <button id="gridViewBtn"
                class="btn btn-outline-dark">
            <i class="bi bi-grid"></i>
            Grid View
        </button>

    </div>

    <div id="servicesContainer" class="row g-4" style="display: none;">

    </div>

</section>

<!-- Footer -->

<footer class="bg-dark text-white py-3">

    <div class="container d-flex justify-content-between align-items-center">

        <p class="mb-0">
            Copyright 2026 Stadia Gym
        </p>

        <div>

            <a href="https://www.instagram.com/stadia.lb/"
               target="_blank"
               class="text-white me-3"
               data-bs-toggle="tooltip"
               data-bs-title="Instagram Page">
                <i class="bi bi-instagram"></i>
            </a>

            <a href="https://www.facebook.com/p/Stadia-Gym-100069593043992/"
               target="_blank"
               class="text-white me-3"
               data-bs-toggle="tooltip"
               data-bs-title="Facebook Page">
                <i class="bi bi-facebook"></i>
            </a>

            <a href="https://x.com/StadiaGymlb"
               class="text-white"
               data-bs-toggle="tooltip"
               data-bs-title="X Page">
                <i class="bi bi-twitter-x"></i>
            </a>

        </div>

    </div>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script src="api.js"></script>
<script src="script.js"></script>

<script>
const tooltipTriggerList = document.querySelectorAll('[data-bs-toggle="tooltip"]');

const tooltipList = [...tooltipTriggerList].map(
    tooltipTriggerEl => new bootstrap.Tooltip(tooltipTriggerEl)
);
</script>
