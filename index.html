<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stadia Gym - Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
    <div class="container-fluid min-vh-100 d-flex justify-content-center align-items-center">
        <div class="login-card p-4">
            <h1 class="text-center mb-3">Stadia Gym</h1>
            <p class="text-center text-muted mb-4">Login to access your fitness journey</p>
            <form id="loginForm">
                <div class="mb-3">
                    <label for="email" class="form-label">
                        Email Address
                    </label>
                    <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">
                        Password
                    </label>
                    <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
                </div>
                <div id="errorMessage" class="text-danger fw-bold mb-3 text-center"></div>
                <div class="d-flex justify-content-between">
                    <button type="button" id="clearBtn" class="btn btn-secondary">
                        Clear
                    </button>
                    <button type="submit" class="btn login-btn">
                        Login
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
